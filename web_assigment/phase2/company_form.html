<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Company Sign Up</title>
  <!-- Add Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/user&company_form.css" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

<div class="form-container">
  <h2 class="form-title">Company Sign Up</h2>

  <!-- START FORM -->
  <form action="company_profile.html" method="POST">

    <div class="input-row">
      <div class="input-group">
        <label for="company-name">Company Name</label>
        <input type="text" id="company-name" name="company-name" placeholder="Enter your company name" required />
      </div>

      <div class="input-group">
        <label for="industry">Industry</label>
        <input type="text" id="industry" name="industry" placeholder="e.g., IT, Finance, Healthcare" required />
      </div>
    </div>

    <div class="input-group">
      <label for="company-email">Company Email</label>
      <input type="email" id="company-email" name="company-email" placeholder="Enter a valid business email" required />
    </div>

    <div class="input-group">
      <label for="phone">Contact Number</label>
      <input type="tel" id="phone" name="phone" placeholder="Enter company contact number" required />
    </div>

    <div class="input-group">
      <label for="location">Headquarters Location</label>
      <input type="text" id="location" name="location" placeholder="City, Country" required />
    </div>

    <div class="input-group">
      <label for="website">Company Website</label>
      <input type="url" id="website" name="website" placeholder="https://example.com" required />
    </div>

    <div class="input-group">
      <label for="password">Create Password</label>
      <input type="password" id="password" name="password" placeholder="Enter a secure password" required />
    </div>

    <div class="input-group">
      <label for="confirm-password">Confirm Password</label>
      <input type="password" id="confirm-password" name="confirm-password" placeholder="Re-enter password" required />
    </div>

    <button type="submit" class="submit-btn">Submit</button>

    <div class="divider">OR</div>

    <button type="button" class="google-btn">
      <img src="img/google.png" alt="Google Logo" />
      Sign Up with Google
    </button>

  </form>
  <!-- END FORM -->
</div>

<script src="js/app.js"></script>
</body>
</html>
